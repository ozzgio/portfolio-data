name: Sync weekly articles to Synergym

on:
  push:
    branches: [ main ]
    paths:
      - 'data/articles.json'
      - 'images/**'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNERGYM_WEBHOOK_URL: ${{ secrets.SYNERGYM_WEEKLY_WEBHOOK_URL }}
      SYNERGYM_WEBHOOK_TOKEN: ${{ secrets.WEBHOOK_WEEKLY_ARTICLE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Sync all published articles to Synergym
        run: |
          ruby - <<'RUBY'
          require "json"
          require "net/http"
          require "uri"
          require "date"

          webhook_url = ENV.fetch("SYNERGYM_WEBHOOK_URL")
          webhook_token = ENV.fetch("SYNERGYM_WEBHOOK_TOKEN")

          path = File.join("data", "articles.json")
          unless File.exist?(path)
            puts "No data/articles.json found; nothing to sync."
            exit 0
          end

          articles = JSON.parse(File.read(path))
          if articles.empty?
            puts "data/articles.json is empty; nothing to sync."
            exit 0
          end

          def build_slug(article)
            url = article["url"].to_s
            if !url.empty?
              begin
                uri = URI.parse(url)
                seg = uri.path.split("/").reject(&:empty?).last
                return seg.downcase.gsub(/[^a-z0-9\-]+/, "-").gsub(/^-|-$/, "") if seg && !seg.empty?
              rescue URI::InvalidURIError
              end
            end

            title = article["title"].to_s
            return "post-#{Time.now.to_i}" if title.empty?
            title.downcase.gsub(/[^a-z0-9\-]+/, "-").gsub(/^-|-$/, "")
          end

          def build_thumbnail_url(article)
            thumb = article["thumbnail"].to_s
            return nil if thumb.empty?
            "https://raw.githubusercontent.com/ozzgio/portfolio-data/main/images/#{thumb}"
          end

          uri = URI.parse(webhook_url)
          http = Net::HTTP.new(uri.host, uri.port)
          http.use_ssl = uri.scheme == "https"

          articles.each do |article|
            slug  = build_slug(article)
            title = article["title"].to_s
            desc  = article["description"].to_s
            date  = article["date"].to_s
            url   = article["url"].to_s
            tags  = Array(article["tags"]).map(&:to_s)

            published_at =
              begin
                Date.parse(date).to_time.iso8601
              rescue
                nil
              end

            content_markdown = if !desc.empty? || !url.empty?
                                  body = desc.dup
                                  body << "\n\n" unless body.empty?
                                  body << "[Read full article](#{url})" unless url.empty?
                                  body
                                else
                                  ""
                                end

            payload = {
              slug: slug,
              title: title,
              description: desc,
              content_markdown: content_markdown,
              status: "published",
              published_at: published_at,
              thumbnail_url: build_thumbnail_url(article),
              tags: tags,
              version: article["version"].to_s.presence
            }

            req = Net::HTTP::Post.new(uri.request_uri)
            req["Content-Type"] = "application/json"
            req["X-Webhook-Token"] = webhook_token
            req.body = JSON.dump(payload)

            puts "Syncing #{slug}..."
            res = http.request(req)
            puts "  -> #{res.code} #{res.message}"
            puts "  Response body: #{res.body}" unless res.is_a?(Net::HTTPSuccess)
          end
          RUBY

