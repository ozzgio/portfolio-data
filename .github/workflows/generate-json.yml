name: Validate Portfolio Data

on:
  push:
    branches:
      - main
    paths:
      - 'articles.json'
      - 'books.json'
      - 'images/**'
      - 'scripts/validate_content.py'
      - '.github/workflows/generate-json.yml'
  pull_request:
    paths:
      - 'articles.json'
      - 'books.json'
      - 'images/**'
      - 'scripts/validate_content.py'
      - '.github/workflows/generate-json.yml'
  workflow_dispatch:

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Validate published artifacts
        run: python3 scripts/validate_content.py

      # After content validates on main, trigger an ozzo.blog rebuild via a
      # Vercel Deploy Hook so new articles are generated as static HTML at
      # build time instead of racing GitHub's raw-CDN propagation at request
      # time. PRs and manual runs are skipped; a missing secret skips safely.
      - name: Rebuild ozzo.blog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set; skipping rebuild trigger."
            exit 0
          fi
          curl --fail -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"source":"portfolio-data","ref":"'$GITHUB_SHA'"}' >/dev/null
          echo "Triggered ozzo.blog rebuild via Vercel deploy hook."

      - name: Summary
        if: always()
        run: |
          echo "## Portfolio Data Validation" >> $GITHUB_STEP_SUMMARY
          echo "Validated required fields, URL formats, and referenced image files." >> $GITHUB_STEP_SUMMARY
