name: Validate Portfolio Data

on:
  push:
    branches:
      - main
    paths:
      - 'articles.json'
      - 'books.json'
      - 'data/**'
      - 'images/**'
      - 'scripts/validate_content.py'
      - '.github/workflows/generate-json.yml'
  pull_request:
    paths:
      - 'articles.json'
      - 'books.json'
      - 'data/**'
      - 'images/**'
      - 'scripts/validate_content.py'
      - '.github/workflows/generate-json.yml'
  workflow_dispatch:

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Validate published artifacts
        run: python3 scripts/validate_content.py

      - name: Summary
        if: always()
        run: |
          echo "## Portfolio Data Validation" >> $GITHUB_STEP_SUMMARY
          echo "Validated JSON mirrors, required fields, URL formats, and referenced image files." >> $GITHUB_STEP_SUMMARY
